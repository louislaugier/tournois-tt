# Used for PaaS deployment

events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream api {
        server api:8080;
    }

    # Add MIME types for frontend assets
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Redirect HTTP to HTTPS
    # server {
    #     listen 80;
    #     server_name ${DOMAIN};
    #     return 301 https://$server_name$request_uri;
    # }

    # HTTPS server
    server {
        # Remove SSL listen and replace with standard HTTP
        listen 80;
        server_name ${DOMAIN};

        # Comment out SSL configuration
        # ssl_certificate /etc/nginx/ssl/live/${DOMAIN}/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/live/${DOMAIN}/privkey.pem;
        
        # Comment out SSL settings
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_prefer_server_ciphers off;
        # ssl_session_timeout 1d;
        # ssl_session_cache shared:SSL:50m;
        # add_header Strict-Transport-Security "max-age=31536000" always;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API endpoints
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers for production
            add_header 'Access-Control-Allow-Origin' 'http://${DOMAIN}' always;
            add_header 'Access-Control-Allow-Methods' 'GET' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # Essential security headers
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }
    }
} 